name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            arch: x64
          - goarch: 386
            arch: x86
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        shell: pwsh
        env:
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath -ldflags "-s -w" -o "pvm-windows-${{ matrix.arch }}.exe" .
          if (-not (Test-Path "pvm-windows-${{ matrix.arch }}.exe")) {
            throw "build failed for GOARCH=$env:GOARCH"
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pvm-windows-${{ matrix.arch }}
          path: pvm-windows-${{ matrix.arch }}.exe
          if-no-files-found: error
